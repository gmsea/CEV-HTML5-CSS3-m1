<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
            
        }

        a:hover {
            color: black;
            text-decoration: underline ;
        }

        a:active {
            color: yellow;
        }

        a::before {
            content: '~>';
            text-decoration: none;
            font-weight: normal;
            color: darkgray
        }
        a::after {
            content: '<~';
            text-decoration: none;
            font-weight: normal;
            color: darkgray
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/gmsea" target="_blank">Repositorio GitHub</a></li>
        <li><a href="youtube.com/watch?v=vMlrcOVr7po&time_continue=228&source_ve_path=NzY3NTg&embeds_referring_euri=https%3A%2F%2Fwww.cursoemvideo.com%2F" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do CursoemVideo</a></li>
    </ul>

</body>
</html>
